name = "qualmly-monitor"
main = "src/index.js"
compatibility_date = "2026-04-01"

# Cron trigger: runs every hour. Pass-through to scheduled() handler.
[triggers]
crons = ["0 * * * *"]

# KV namespaces — create these in `wrangler kv:namespace create <NAME>` first,
# then paste the IDs here.
[[kv_namespaces]]
binding = "USERS"
id = "a0ca07227b7046f082902681474a5b89"

[[kv_namespaces]]
binding = "WATCHES"
id = "56e22ce29e0e402a9dc0f7c481160b9f"

[[kv_namespaces]]
binding = "HISTORY"
id = "18a0d7dcd7d140c69638cb3f240aced5"

# Secrets (set via `wrangler secret put <NAME>`):
#   - RESEND_API_KEY      — for sending diff emails (resend.com)
#   - STRIPE_SECRET_KEY   — for verifying webhooks
#   - STRIPE_WEBHOOK_SECRET

[observability]
enabled = true

# Note: [limits] cpu_ms is a paid-plan feature. Free plan default (10ms) is
# sufficient because the Worker is mostly waiting on Anthropic's response,
# which doesn't count against CPU time.
